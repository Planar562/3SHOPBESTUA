<!DOCTYPE html>
<html>
<head>
    <title>3BESTSHOP</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
            margin: 0;
        }

        h1 {
            margin-top: 50px;
        }

        button {
            background: black;
            color: white;
            border: none;
            padding: 15px;
            margin: 10px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: orange;
        }

        .catalog {
            display: none;
            margin-top: 30px;
        }
    </style>
</head>

<body>

<!-- ГОЛОВНИЙ ЕКРАН -->
<div id="start">
    <h1>Привіт 👋</h1>
    <button onclick="showCatalog()">Товар</button>
</div>

<!-- КАТАЛОГ -->
<div id="catalog" class="catalog">
    <h1>Каталог</h1>

    <button>Кросівки</button><br>
    <button>Кофти</button><br>
    <button>Шорти</button><br>
    <button>Джинси</button><br>
    <button>Футболки</button>
</div>

<script>
function showCatalog() {
    document.getElementById("start").style.display = "none";
    document.getElementById("catalog").style.display = "block";
}
</script>

</body>
</html>
