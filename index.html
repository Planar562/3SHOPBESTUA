<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3BESTSHOP</title>

<style>
body {
  background: black;
  color: white;
  font-family: Arial;
  margin: 0;
}

/* меню */
.menu {
  padding: 15px;
  display: flex;
  justify-content: space-between;
}

/* підтримка */
.support {
  position: fixed;
  top: 10px;
  right: 10px;
  background: white;
  color: black;
  padding: 10px;
  font-weight: bold;
  border-radius: 8px;
}

/* блоки */
.section {
  display: none;
  padding: 20px;
}

/* товар */
.product {
  border: 1px solid white;
  padding: 15px;
  margin: 15px;
  width: 200px;
}

/* картинки */
.product img {
  width: 100%;
}

/* кнопки */
button {
  background: white;
  color: black;
  border: none;
  padding: 10px;
  margin-top: 5px;
  cursor: pointer;
  border-radius: 6px;
  font-weight: bold;
}

button:hover {
  background: #ccc;
}

/* розміри */
.size {
  display: none;
}
</style>

</head>

<body>

<!-- підтримка -->
<div class="support">
  Підтримка<br>
  676-6767-6767
</div>

<!-- головна -->
<div id="home" class="section" style="display:block;">
  <h1>Ласкаво просимо 👋</h1>
  <button onclick="show('catalog')">Каталог</button>
</div>

<!-- каталог -->
<div id="catalog" class="section">
  <h2>Каталог</h2>

  <button onclick="show('tshirts')">Футболки</button>
  <button onclick="show('shorts')">Шорти</button>
  <button onclick="show('jeans')">Джинси</button>
  <button onclick="show('hoodie')">Кофти</button>
  <button onclick="show('shoes')">Кросівки</button>
</div>

<!-- ФУТБОЛКИ -->
<div id="tshirts" class="section">
  <h2>Футболки</h2>

  <div class="product">
    <img src="tshirt1.png">
    <p>Hell Star</p>
    <p>799 грн</p>

    <button onclick="showSize(this)">Замовити</button>

    <div class="size">
      <button onclick="buy()">XS</button>
      <button onclick="buy()">S</button>
      <button onclick="buy()">M</button>
      <button onclick="buy()">L</button>
      <button onclick="buy()">XL</button>
    </div>
  </div>

</div>

<!-- ШОРТИ -->
<div id="shorts" class="section">
  <h2>Шорти</h2>

  <div class="product">
    <img src="shorts1.png">
    <p>Burberry</p>
    <p>650 грн</p>

    <button onclick="showSize(this)">Замовити</button>

    <div class="size">
      <button onclick="buy()">XS</button>
      <button onclick="buy()">S</button>
      <button onclick="buy()">M</button>
      <button onclick="buy()">L</button>
      <button onclick="buy()">XL</button>
    </div>
  </div>

  <div class="product">
    <img src="shorts2.png">
    <p>Balenciaga x Guess</p>
    <p>1399 грн</p>

    <button onclick="showSize(this)">Замовити</button>

    <div class="size">
      <button onclick="buy()">XS</button>
      <button onclick="buy()">S</button>
      <button onclick="buy()">M</button>
      <button onclick="buy()">L</button>
      <button onclick="buy()">XL</button>
    </div>
  </div>

</div>

<!-- СКРИПТ -->
<script>

function show(id) {
  document.querySelectorAll('.section').forEach(el => el.style.display = 'none');
  document.getElementById(id).style.display = 'block';
}

function showSize(btn) {
  btn.nextElementSibling.style.display = 'block';
}

function buy() {
  window.open("https://t.me/planar3", "_blank");
}

</script>

</body>
</html>
