<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>3BESTSHOP-UA</title>

<style>

/* ОСНОВА */
body{
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
}

/* ЛОГО */
.logo{
  position:fixed;
  left:20px;
  bottom:20px;
  font-size:18px;
  font-weight:bold;
}

/* ПІДТРИМКА */
.support{
  position:fixed;
  top:15px;
  right:15px;
  background:white;
  color:black;
  padding:10px 15px;
  border-radius:10px;
}

/* КНОПКИ */
button{
  padding:12px;
  margin:8px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:white;
  color:black;
  font-size:16px;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

/* ЦЕНТР */
.center{
  text-align:center;
  margin-top:120px;
}

/* ТОВАРИ */
.product{
  background:#111;
  padding:15px;
  margin:10px;
  border-radius:15px;
  display:inline-block;
  width:220px;
  cursor:pointer;
  transition:0.3s;
}

.product:hover{
  transform:scale(1.05);
}

.product img{
  width:100%;
  border-radius:10px;
}

/* СТАТУС */
.available{
  color:lime;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#111;
  padding:20px;
  border-radius:15px;
  text-align:center;
  animation:zoomIn 0.3s ease;
}

@keyframes zoomIn{
  from{transform:scale(0.7);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

/* СТРІЛКИ */
.arrow{
  font-size:30px;
  cursor:pointer;
  margin:10px;
}

</style>
</head>

<body>

<div class="logo">3BESTSHOP-UA</div>
<div class="support">Підтримка: 676-6767-6767</div>

<!-- ГОЛОВНА -->
<div id="home" class="center">
  <h1>Ласкаво просимо</h1>
  <button onclick="showCatalog()">Каталог</button>
</div>

<!-- КАТАЛОГ -->
<div id="catalog" class="center" style="display:none">

  <button onclick="goHome()">⬅ Назад</button>

  <br>

  <button onclick="openCategory('tshirts')">Футболки</button>
  <button onclick="openCategory('shorts')">Шорти</button>
  <button onclick="openCategory('jeans')">Джинси</button>
  <button onclick="openCategory('hoodie')">Кофти</button>
  <button onclick="openCategory('shoes')">Кросівки</button>

  <div id="products"></div>

</div>

<!-- POPUP -->
<div id="modal" class="modal">
  <div class="modal-content">

    <span class="arrow" onclick="prevImg()">⬅</span>
    <img id="modalImg" width="250">
    <span class="arrow" onclick="nextImg()">➡</span>

    <h3 id="modalTitle"></h3>
    <p id="modalDesc"></p>
    <p id="modalPrice"></p>

    <div id="sizes"></div>

    <br>
    <button onclick="order()">Замовити</button>
    <br><br>
    <button onclick="closeModal()">Закрити</button>

  </div>
</div>

<script>

let currentImages=[];
let currentIndex=0;

function showCatalog(){
  document.getElementById("home").style.display="none";
  document.getElementById("catalog").style.display="block";
}

function goHome(){
  document.getElementById("catalog").style.display="none";
  document.getElementById("home").style.display="block";
}

function openCategory(type){

  let html="";

  if(type==="shorts"){
    html += product("Burberry Shorts", "Розміри: M, L<br>Чорні / Білі<br>В наявності", "650 грн","shorts");
    html += product("Balenciaga x Guess Shorts", "Розміри: M, L<br>Чорні / Білі<br>В наявності", "1399 грн","balshorts");
  }

  if(type==="tshirts"){
    html += product("Hell Star T-shirt S", "Розмір: S<br>В наявності", "799 грн","ts1");
    html += product("Hell Star T-shirt M", "Розмір: M<br>В наявності", "799 грн","ts2");
  }

  if(type==="jeans"){
    html += product("Gallery Dept Jeans", "Сірі джинси<br>Стильні і топ<br>В наявності", "1200 грн","jeans");
  }

  if(type==="hoodie"){
    html += product("Gucci x Balenciaga Hoodie", "Преміум якість<br>В наявності", "1199 грн","hoodie");
  }

  if(type==="shoes"){
    html += product("Balenciaga Runner Grey", "Розміри: 42, 43, 44<br>В наявності", "2000 грн","shoes");
  }

  document.getElementById("products").innerHTML = html;
}

function product(title, desc, price, key){
  return `
    <div class="product" onclick="openModal('${key}')">
      <img src="${key}1.jpg">
      <h3>${title}</h3>
      <p class="available">В наявності</p>
    </div>
  `;
}

function openModal(key){

  currentIndex=0;
  currentImages = [
    key+"1.jpg",
    key+"2.jpg",
    key+"3.jpg",
    key+"4.jpg",
    key+"5.jpg"
  ];

  document.getElementById("modal").style.display="flex";
  document.getElementById("modalImg").src = currentImages[0];

  document.getElementById("modalTitle").innerText = key;
  document.getElementById("modalDesc").innerHTML = "Якісний товар 🔥";
  document.getElementById("modalPrice").innerText = "Ціна уточнюється";

  document.getElementById("sizes").innerHTML = `
    <button>XS</button>
    <button>S</button>
    <button>M</button>
    <button>L</button>
    <button>XL</button>
  `;
}

function nextImg(){
  currentIndex = (currentIndex+1)%currentImages.length;
  document.getElementById("modalImg").src = currentImages[currentIndex];
}

function prevImg(){
  currentIndex = (currentIndex-1+currentImages.length)%currentImages.length;
  document.getElementById("modalImg").src = currentImages[currentIndex];
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function order(){
  window.open("https://t.me/твій_нік","_blank");
}

</script>

</body>
</html>
