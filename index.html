<!DOCTYPE html>
<html>
<head>
    <title>3BESTSHOP</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
            margin: 0;
        }

        h1 {
            margin-top: 30px;
        }

        button {
            background: black;
            color: white;
            border: none;
            padding: 12px;
            margin: 10px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: orange;
        }

        .catalog {
            display: none;
        }

        .item {
            background: white;
            margin: 15px;
            padding: 15px;
            border-radius: 10px;
        }

        img {
            width: 200px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<!-- СТАРТ -->
<div id="start">
    <h1>Привіт 👋</h1>
    <button onclick="showCatalog()">Товар</button>
</div>

<!-- КАТАЛОГ -->
<div id="catalog" class="catalog">
    <h1>Каталог</h1>

    <div class="item">
        <img src="krosivki.png">
        <br>
        <button>Кросівки</button>
    </div>

    <div class="item">
        <img src="kofti.png">
        <br>
        <button>Кофти</button>
    </div>

    <div class="item">
        <img src="shorty.png">
        <br>
        <button>Шорти</button>
    </div>

    <div class="item">
        <img src="jeans.png">
        <br>
        <button>Джинси</button>
    </div>

    <div class="item">
        <img src="tshirt.png">
        <br>
        <button>Футболки</button>
    </div>

</div>

<script>
function showCatalog() {
    document.getElementById("start").style.display = "none";
    document.getElementById("catalog").style.display = "block";
}
</script>

</body>
</html>
