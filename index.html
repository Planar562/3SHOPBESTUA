<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3BESTSHOP</title>

<style>
body {
  background: black;
  color: white;
  font-family: Arial;
  margin: 0;
  text-align: center;
}

/* кнопка назад */
.back {
  position: fixed;
  top: 10px;
  left: 10px;
}

/* підтримка */
.support {
  position: fixed;
  top: 10px;
  right: 10px;
  background: white;
  color: black;
  padding: 10px;
  border-radius: 8px;
}

/* логотип */
.logo {
  position: fixed;
  bottom: 10px;
  left: 10px;
  font-weight: bold;
}

/* секції */
.section {
  display: none;
  padding-top: 80px;
}

/* кнопки */
button {
  background: white;
  color: black;
  border: none;
  padding: 12px;
  margin: 10px;
  border-radius: 8px;
  cursor: pointer;
}

/* товар */
.product {
  border: 1px solid white;
  padding: 15px;
  margin: 20px auto;
  width: 220px;
}

.product img {
  width: 100%;
}

/* розміри */
.size {
  display: none;
}
</style>

</head>

<body>

<!-- назад -->
<div class="back">
  <button onclick="showSection('home')">← Назад</button>
</div>

<!-- підтримка -->
<div class="support">
  Підтримка<br>676-6767-6767
</div>

<!-- логотип -->
<div class="logo">
  3BESTSHOP-UA
</div>

<!-- ГОЛОВНА -->
<div id="home" class="section" style="display:block;">
  <h1>Ласкаво просимо 👋</h1>
  <button onclick="showSection('catalog')">Каталог</button>
</div>

<!-- КАТАЛОГ -->
<div id="catalog" class="section">
  <h2>Каталог</h2>

  <button onclick="showSection('tshirts')">Футболки</button>
  <button onclick="showSection('shorts')">Шорти</button>
  <button onclick="showSection('jeans')">Джинси</button>
  <button onclick="showSection('hoodie')">Кофти</button>
  <button onclick="showSection('shoes')">Кросівки</button>
</div>

<!-- ФУТБОЛКИ -->
<div id="tshirts" class="section">
  <h2>Футболки</h2>

  <div class="product">
    <img src="tshirt1.png">

    <p>Футболка Hell Star</p>
    <p>Ціна: 799 грн</p>

    <button onclick="showSize(this)">Замовити</button>

    <div class="size">
      <button onclick="buy()">XS</button>
      <button onclick="buy()">S</button>
      <button onclick="buy()">M</button>
      <button onclick="buy()">L</button>
      <button onclick="buy()">XL</button>
    </div>
  </div>
</div>

<!-- ШОРТИ -->
<div id="shorts" class="section">
  <h2>Шорти</h2>

  <div class="product">
    <img src="shorts1.png">
    <p>Burberry</p>
    <p>650 грн</p>

    <button onclick="showSize(this)">Замовити</button>
    <div class="size">
      <button onclick="buy()">XS</button>
      <button onclick="buy()">S</button>
      <button onclick="buy()">M</button>
      <button onclick="buy()">L</button>
      <button onclick="buy()">XL</button>
    </div>
  </div>

  <div class="product">
    <img src="shorts2.png">
    <p>Balenciaga x Guess</p>
    <p>1399 грн</p>

    <button onclick="showSize(this)">Замовити</button>
    <div class="size">
      <button onclick="buy()">XS</button>
      <button onclick="buy()">S</button>
      <button onclick="buy()">M</button>
      <button onclick="buy()">L</button>
      <button onclick="buy()">XL</button>
    </div>
  </div>
</div>

<!-- ДЖИНСИ -->
<div id="jeans" class="section">
  <h2>Джинси</h2>

  <div class="product">
    <img src="jeans1.png">
    <p>Gallery Dept</p>
    <p>1199 грн</p>

    <button onclick="showSize(this)">Замовити</button>
    <div class="size">
      <button onclick="buy()">XS</button>
      <button onclick="buy()">S</button>
      <button onclick="buy()">M</button>
      <button onclick="buy()">L</button>
      <button onclick="buy()">XL</button>
    </div>
  </div>
</div>

<!-- КОФТИ -->
<div id="hoodie" class="section">
  <h2>Кофти</h2>

  <div class="product">
    <img src="hoodie1.png">
    <p>Gucci x Balenciaga</p>
    <p>1199 грн</p>

    <button onclick="showSize(this)">Замовити</button>
    <div class="size">
      <button onclick="buy()">XS</button>
      <button onclick="buy()">S</button>
      <button onclick="buy()">M</button>
      <button onclick="buy()">L</button>
      <button onclick="buy()">XL</button>
    </div>
  </div>
</div>

<!-- СКРИПТ -->
<script>
function showSection(id) {
  let sections = document.querySelectorAll('.section');
  sections.forEach(function(el) {
    el.style.display = 'none';
  });

  let active = document.getElementById(id);
  if (active) {
    active.style.display = 'block';
  }
}

function showSize(btn) {
  btn.nextElementSibling.style.display = 'block';
}

function buy() {
  window.open("https://t.me/planar3", "_blank");
}
</script>

</body>
</html>
